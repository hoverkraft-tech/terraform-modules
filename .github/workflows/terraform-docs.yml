name: Generate Terraform Docs

on:
  push:
    branches:
      - main
    paths:
      - "**/*.tf"
  pull_request:
    paths:
      - "**/*.tf"

permissions:
  contents: read

jobs:
  docs:
    permissions:
      contents: write
      pull-requests: write
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: ${{ github.head_ref || github.ref_name }}
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Render terraform docs
        uses: terraform-docs/gh-actions@6de6da0cefcc6b4b7a5cbea4d79d97060733093c # v1
        with:
          find-dir: .
          output-file: README.md
          output-method: inject
          args: --lockfile=false
          git-push: "true"
          git-commit-message: "chore: update terraform docs"
          git-push-user-name: github-actions[bot]
          git-push-user-email: 41898282+github-actions[bot]@users.noreply.github.com
